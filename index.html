<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackSwap — Design Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; height: 100vh; display: flex; flex-direction: column; }

  nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    align-items: center;
  }

  nav span {
    color: #666;
    font-size: 13px;
    margin-right: 8px;
  }

  button {
    padding: 8px 20px;
    border: 1px solid #444;
    background: transparent;
    color: #aaa;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  button:hover {
    border-color: #888;
    color: #fff;
  }

  button.active {
    background: #fff;
    border-color: #fff;
    color: #111;
  }

  iframe {
    flex: 1;
    border: none;
    width: 100%;
  }
</style>
</head>
<body>

<nav>
  <span>TrackSwap</span>
  <button class="active" onclick="show('trackswap-cinematic.html', this)">Cinematic</button>
  <button onclick="show('trackswap-editorial.html', this)">Editorial</button>
  <button onclick="show('trackswap-brutalist.html', this)">Brutalist</button>
</nav>

<iframe id="frame" src="trackswap-cinematic.html"></iframe>

<script>
  function show(page, btn) {
    document.getElementById('frame').src = page;
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
