<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackSwap — Venue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF4500;
    --black: #080808;
    --white: #F0F0F0;
    --grey: #A8A8A8;
    --darkgrey: #1a1a1a;
    --border: #2a2a2a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Barlow', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: var(--body); overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(255,69,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,69,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  :focus-visible { outline: 2px solid var(--orange); outline-offset: 3px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: stretch; height: 56px;
    border-bottom: 2px solid var(--orange); background: var(--black);
  }
  .nav-logo-block {
    display: flex; align-items: center; padding: 0 28px;
    border-right: 2px solid var(--border);
    font-family: var(--display); font-size: 24px; letter-spacing: 4px; color: var(--orange); text-decoration: none;
  }
  .nav-back {
    display: flex; align-items: center; padding: 0 24px; gap: 8px;
    border-right: 1px solid var(--border);
    color: var(--grey); text-decoration: none;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
  }
  .nav-back:hover { color: var(--white); background: rgba(255,69,0,0.06); }
  .nav-right { display: flex; align-items: stretch; margin-left: auto; }
  .nav-btn {
    display: flex; align-items: center; padding: 0 28px;
    border-left: 2px solid var(--border);
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; background: none; color: var(--grey); border-top: none; border-right: none; border-bottom: none;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: var(--white); }
  .nav-btn.primary { background: var(--orange); color: var(--white); border-left-color: var(--orange); }
  .nav-btn.primary:hover { background: #ff5a1a; }

  /* HERO */
  .hero {
    position: relative; margin-top: 56px; height: 72vh; min-height: 480px;
    overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .hero-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.45) contrast(1.15) saturate(0.65);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,8,8,0.95) 0%, rgba(8,8,8,0.4) 50%, rgba(8,8,8,0.15) 100%),
                linear-gradient(to right, rgba(8,8,8,0.6) 0%, transparent 60%);
  }
  .hero-breadcrumb {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 0;
    border-bottom: 1px solid rgba(42,42,42,0.6);
    background: rgba(8,8,8,0.5); backdrop-filter: blur(4px);
  }
  .bc-item {
    display: flex; align-items: center; padding: 10px 20px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--grey); text-decoration: none; border-right: 1px solid rgba(42,42,42,0.6);
    transition: color 0.15s;
  }
  .bc-item:hover { color: var(--white); }
  .bc-item.current { color: var(--white); }
  .bc-sep { color: var(--orange); padding: 0 4px; }
  .hero-content {
    position: relative; z-index: 2; padding: 0 60px 56px;
  }
  .hero-type-badge {
    display: inline-block; padding: 5px 12px; margin-bottom: 20px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    border: 1px solid var(--orange); color: var(--orange);
  }
  .hero-name {
    font-family: var(--display); font-size: clamp(64px, 9vw, 120px);
    line-height: 0.88; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px;
  }
  .hero-location {
    font-family: var(--mono); font-size: 12px; letter-spacing: 3px; color: var(--grey); text-transform: uppercase;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-location::before { content: '//'; color: var(--orange); }

  /* STATS STRIP */
  .stats-strip {
    display: grid; grid-template-columns: repeat(5, 1fr);
    border-bottom: 2px solid var(--border); background: var(--darkgrey);
    position: relative; z-index: 1;
  }
  .stat-cell {
    padding: 24px 28px; border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--orange); text-transform: uppercase; margin-bottom: 6px;
  }
  .stat-val {
    font-family: var(--display); font-size: 28px; letter-spacing: 2px; text-transform: uppercase; line-height: 1;
  }

  /* MAIN CONTENT */
  .content-section {
    display: grid; grid-template-columns: 3fr 2fr;
    border-bottom: 2px solid var(--border);
    position: relative; z-index: 1;
  }
  .content-left {
    padding: 64px 60px; border-right: 2px solid var(--border);
  }
  .content-right {
    padding: 64px 48px;
  }
  .section-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--orange); text-transform: uppercase;
    margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .content-desc {
    font-size: 15px; color: var(--grey); line-height: 1.75; max-width: 560px; margin-bottom: 48px;
  }
  .facilities-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  }
  .facility-item {
    padding: 14px 0; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--grey); display: flex; align-items: flex-start; gap: 12px;
  }
  .facility-item::before {
    content: '→'; font-family: var(--mono); font-size: 10px; color: var(--orange); flex-shrink: 0; margin-top: 2px;
  }
  .facility-item:nth-last-child(-n+2) { border-bottom: none; }

  /* SPECS TABLE */
  .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
  .specs-table tr { border-bottom: 1px solid var(--border); }
  .specs-table tr:last-child { border-bottom: none; }
  .specs-table td {
    padding: 13px 0; font-size: 13px; vertical-align: top;
  }
  .specs-table td:first-child { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--orange); text-transform: uppercase; width: 40%; padding-right: 16px; }
  .specs-table td:last-child { color: var(--white); }

  .rules-list { list-style: none; }
  .rules-list li {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--grey); display: flex; gap: 12px; align-items: flex-start;
  }
  .rules-list li:last-child { border-bottom: none; }
  .rules-list li::before {
    content: '!'; font-family: var(--mono); font-size: 10px; font-weight: bold;
    color: var(--orange); flex-shrink: 0; margin-top: 2px;
  }

  /* GALLERY */
  .gallery {
    display: grid; grid-template-columns: repeat(3, 1fr); height: 320px;
    border-top: 2px solid var(--border); border-bottom: 2px solid var(--border);
    position: relative; z-index: 1;
  }
  .gallery-cell { position: relative; overflow: hidden; border-right: 2px solid var(--border); }
  .gallery-cell:last-child { border-right: none; }
  .gallery-cell img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(20%) brightness(0.6) contrast(1.1);
    transition: filter 0.4s, transform 0.5s;
  }
  .gallery-cell:hover img { filter: grayscale(0%) brightness(0.75); transform: scale(1.04); }
  .gallery-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(8,8,8,0.92));
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--grey); text-transform: uppercase;
  }
  .gallery-caption span { color: var(--orange); }

  /* BOOKING CTA */
  .booking-cta {
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 40px;
    padding: 64px 60px;
    background: var(--darkgrey); border-bottom: 2px solid var(--border);
    position: relative; z-index: 1; overflow: hidden;
  }
  .booking-cta::before {
    content: 'BOOK'; position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
    font-family: var(--display); font-size: 200px; letter-spacing: 8px;
    color: rgba(255,255,255,0.02); pointer-events: none; white-space: nowrap;
  }
  .cta-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--orange); text-transform: uppercase; margin-bottom: 12px; }
  .cta-title { font-family: var(--display); font-size: clamp(40px, 5vw, 64px); letter-spacing: 3px; text-transform: uppercase; line-height: 0.95; margin-bottom: 12px; }
  .cta-sub { font-size: 14px; color: var(--grey); line-height: 1.6; max-width: 480px; }
  .cta-right { text-align: right; flex-shrink: 0; }
  .cta-price { font-family: var(--display); font-size: 72px; color: var(--orange); letter-spacing: 2px; line-height: 1; }
  .cta-price-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--grey); text-transform: uppercase; margin-bottom: 24px; }
  .btn-book {
    display: block; padding: 18px 56px;
    background: var(--orange); color: var(--white); border: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-book:hover { background: #ff5a1a; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 500;
    display: none; align-items: center; justify-content: center;
    padding: 24px; background: rgba(0,0,0,0.76); backdrop-filter: blur(8px);
  }
  .modal-backdrop.open { display: flex; }
  .demo-modal {
    width: min(640px, 100%); max-height: min(760px, 92vh); overflow: auto;
    background: #080808; border: 2px solid var(--orange);
    box-shadow: 16px 16px 0 rgba(255,69,0,0.18);
  }
  .modal-head { display: flex; justify-content: space-between; gap: 24px; padding: 24px; border-bottom: 2px solid var(--border); }
  .modal-kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--orange); text-transform: uppercase; margin-bottom: 8px; }
  .modal-title { font-family: var(--display); font-size: 46px; letter-spacing: 3px; text-transform: uppercase; line-height: 0.95; }
  .modal-close { width: 40px; height: 40px; border: 2px solid var(--border); background: transparent; color: var(--white); cursor: pointer; font-size: 22px; flex-shrink: 0; }
  .modal-body { padding: 24px; display: grid; gap: 18px; }
  .demo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .demo-field { display: grid; gap: 8px; }
  .demo-field label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--grey); text-transform: uppercase; }
  .demo-field input, .demo-field select {
    width: 100%; background: #101010; border: 2px solid var(--border);
    color: var(--white); font: 14px var(--body); padding: 13px 14px;
  }
  .slot-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .slot-btn { padding: 10px 14px; background: #101010; border: 2px solid var(--border); color: var(--grey); font-family: var(--mono); font-size: 12px; cursor: pointer; }
  .slot-btn.active { border-color: var(--orange); color: var(--orange); background: #1a0900; }
  .summary-box { border: 2px solid rgba(255,69,0,0.45); background: #140700; padding: 16px; color: var(--grey); font-size: 14px; line-height: 1.6; }
  .btn-brutal-fill {
    padding: 16px 40px; background: var(--orange); color: var(--white); border: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-brutal-fill:hover { background: #ff5a1a; }

  .toast {
    position: fixed; right: 24px; bottom: 24px; z-index: 700;
    display: none; max-width: 380px; padding: 14px 16px;
    background: var(--orange); color: var(--white); font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    box-shadow: 8px 8px 0 rgba(255,255,255,0.12);
  }
  .toast.open { display: block; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .sys-dot { width: 6px; height: 6px; background: var(--orange); border-radius: 50%; animation: blink 1.2s step-end infinite; display: inline-block; }

  /* 404 state */
  .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 24px; position: relative; z-index: 1; }
  .not-found-code { font-family: var(--display); font-size: 120px; color: var(--orange); letter-spacing: 4px; line-height: 1; }
  .not-found-msg { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--grey); text-transform: uppercase; }
  .not-found-link { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--orange); text-transform: uppercase; text-decoration: none; border: 1px solid var(--orange); padding: 12px 24px; transition: background 0.15s; }
  .not-found-link:hover { background: rgba(255,69,0,0.1); }

  @media (max-width: 1024px) {
    .content-section { grid-template-columns: 1fr; }
    .content-left { border-right: none; border-bottom: 2px solid var(--border); }
    .stats-strip { grid-template-columns: repeat(3, 1fr); }
    .stats-strip .stat-cell:nth-child(3) { border-right: none; }
    .stats-strip .stat-cell:nth-child(4) { border-top: 1px solid var(--border); }
    .stats-strip .stat-cell:nth-child(5) { border-top: 1px solid var(--border); }
    .booking-cta { grid-template-columns: 1fr; }
    .cta-right { text-align: left; }
  }
  @media (max-width: 768px) {
    .hero-name { font-size: clamp(48px, 12vw, 80px); }
    .hero-content { padding: 0 24px 40px; }
    .gallery { grid-template-columns: 1fr; height: auto; }
    .gallery-cell { height: 200px; border-right: none; border-bottom: 2px solid var(--border); }
    .gallery-cell:last-child { border-bottom: none; }
    .content-left { padding: 40px 24px; }
    .content-right { padding: 40px 24px; }
    .booking-cta { padding: 48px 24px; }
    .stats-strip { grid-template-columns: 1fr 1fr; }
    .stats-strip .stat-cell:nth-child(3) { border-right: 1px solid var(--border); }
    .stats-strip .stat-cell:nth-child(5) { border-right: none; }
    .demo-grid { grid-template-columns: 1fr; }
    nav { flex-wrap: wrap; height: auto; }
  }
</style>
</head>
<body>

<nav>
  <a href="trackswap-brutalist.html" class="nav-logo-block">TRACKSWAP</a>
  <a href="trackswap-all-tracks.html" class="nav-back">&#8592; All Venues</a>
  <div class="nav-right">
    <button class="nav-btn" type="button" id="navSignin">Sign In</button>
    <button class="nav-btn primary" type="button" id="navOwner">List Your Track</button>
  </div>
</nav>

<div id="venueContent"></div>

<!-- BOOKING MODAL -->
<div class="modal-backdrop" id="bookingModal" role="dialog" aria-modal="true" aria-labelledby="bookingTitle">
  <div class="demo-modal">
    <div class="modal-head">
      <div>
        <div class="modal-kicker">Demo booking</div>
        <h2 class="modal-title" id="bookingTitle">Reserve Track Time</h2>
      </div>
      <button class="modal-close" type="button" id="closeBooking" aria-label="Close">&times;</button>
    </div>
    <form class="modal-body" id="bookingForm">
      <div class="summary-box" id="bookingSummary"></div>
      <div class="demo-grid">
        <div class="demo-field">
          <label for="bookingVenueName">Venue</label>
          <input id="bookingVenueName" type="text" readonly>
        </div>
        <div class="demo-field">
          <label for="bookingDate">Date</label>
          <input id="bookingDate" name="date" type="date" required>
        </div>
      </div>
      <div class="demo-field">
        <label>Available slots</label>
        <div class="slot-row" id="bookingSlots"></div>
      </div>
      <div class="demo-grid">
        <div class="demo-field">
          <label for="bookingCar">Vehicle</label>
          <input id="bookingCar" name="car" type="text" value="Porsche 911 GT3" required>
        </div>
        <div class="demo-field">
          <label for="bookingInsurance">Insurance</label>
          <select id="bookingInsurance" name="insurance">
            <option>Standard cover · €45</option>
            <option>Track damage cover · €95</option>
            <option>I will bring my own</option>
          </select>
        </div>
      </div>
      <button class="btn-brutal-fill" type="submit">Confirm Demo Reservation</button>
    </form>
  </div>
</div>

<!-- OWNER MODAL -->
<div class="modal-backdrop" id="ownerModal" role="dialog" aria-modal="true" aria-labelledby="ownerTitle">
  <div class="demo-modal">
    <div class="modal-head">
      <div>
        <div class="modal-kicker">Venue owners</div>
        <h2 class="modal-title" id="ownerTitle">List Your Venue</h2>
      </div>
      <button class="modal-close" type="button" id="closeOwner" aria-label="Close">&times;</button>
    </div>
    <form class="modal-body" id="ownerForm">
      <div class="demo-grid">
        <div class="demo-field"><label for="ownerVenue">Venue name</label><input id="ownerVenue" required placeholder="Circuit or airfield name"></div>
        <div class="demo-field"><label for="ownerEmail">Email</label><input id="ownerEmail" type="email" required placeholder="owner@venue.com"></div>
      </div>
      <button class="btn-brutal-fill" type="submit">Request Demo Onboarding</button>
    </form>
  </div>
</div>

<!-- SIGNIN MODAL -->
<div class="modal-backdrop" id="signinModal" role="dialog" aria-modal="true" aria-labelledby="signinTitle">
  <div class="demo-modal">
    <div class="modal-head">
      <div>
        <div class="modal-kicker">Driver account</div>
        <h2 class="modal-title" id="signinTitle">Sign In</h2>
      </div>
      <button class="modal-close" type="button" id="closeSignin" aria-label="Close">&times;</button>
    </div>
    <form class="modal-body" id="signinForm">
      <div class="demo-field"><label for="signinEmail">Email</label><input id="signinEmail" type="email" required placeholder="driver@trackswap.demo"></div>
      <button class="btn-brutal-fill" type="submit">Continue Demo Session</button>
    </form>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

// ── Routing ──────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const id = params.get('id') || '';
const venue = VENUES[id];
const container = document.getElementById('venueContent');

if (!venue) {
  container.innerHTML = `
    <div class="not-found" style="margin-top:56px;">
      <div class="not-found-code">404</div>
      <div class="not-found-msg">Venue not found</div>
      <a href="trackswap-all-tracks.html" class="not-found-link">← Back to All Venues</a>

} else {
  document.title = `TrackSwap — ${venue.name}`;

  container.innerHTML = `
    <section class="hero">
      <img class="hero-img" src="${venue.heroImg}" alt="${venue.name}" fetchpriority="high">
      <div class="hero-overlay"></div>
      <div class="hero-breadcrumb">

      <div class="hero-content">

    <div class="stats-strip" aria-label="Key venue statistics">
      <div class="stat-cell"><div class="stat-label">Length</div><div class="stat-val">${venue.length}</div></div>

      <div class="stat-cell"><div class="stat-label">Noise Limit</div><div class="stat-val">${venue.noise}</div></div>
      <div class="stat-cell"><div class="stat-label">Availability</div><div class="stat-val">${venue.availability}</div></div>
      <div class="stat-cell"><div class="stat-label">From</div><div class="stat-val" style="color:var(--orange)">${venue.price}</div></div>

    <div class="content-section">

        <div class="section-label">Specifications</div>
        <table class="specs-table">
          <tr><td>Venue Type</td><td>${venue.type}</td></tr>

          <tr><td>Pit Facilities</td><td>${venue.pits}</td></tr>
          <tr><td>Noise Limit</td><td>${venue.noise}</td></tr>

          <tr><td>Session Price</td><td style="color:var(--orange);font-family:var(--mono)">${venue.price} / session</td></tr>
        </table>
        <div class="section-label" style="margin-top:40px;">Track Rules</div>

    <div class="gallery" aria-label="Venue gallery">
      ${venue.gallery.map((img, i) => `

          <img src="${img}" alt="${venue.galCaptions[i]}" loading="lazy">
          <div class="gallery-caption">${venue.galCaptions[i].split('—')[0].trim()} <span>— ${(venue.galCaptions[i].split('—')[1]||'').trim()}</span></div>

    <div class="booking-cta">
      <div>

        <div class="cta-price-label">Per Session — ${venue.availability}</div>
        <button class="btn-book" type="button" id="openBookingBtn">Book This Track</button>

  document.getElementById('openBookingBtn').addEventListener('click', openBooking);

// ── Booking modal ─────────────────────────────────────────────────────────
let activeSlot = venue ? venue.slots[0] : null;
const bookingModal = document.getElementById('bookingModal');
const ownerModal   = document.getElementById('ownerModal');
const signinModal  = document.getElementById('signinModal');
const bookingDate  = document.getElementById('bookingDate');
const bookingSlots = document.getElementById('bookingSlots');
const bookingSummary = document.getElementById('bookingSummary');
const toast = document.getElementById('toast');

const tomorrow = new Date(Date.now() + 86400000);
bookingDate.value = tomorrow.toISOString().slice(0, 10);

if (venue) {
  document.getElementById('bookingVenueName').value = venue.name;
}

function renderSlots() {
  bookingSlots.innerHTML = '';
  venue.slots.forEach(slot => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'slot-btn' + (slot === activeSlot ? ' active' : '');
    btn.textContent = slot;
    btn.setAttribute('aria-pressed', String(slot === activeSlot));
    btn.onclick = () => { activeSlot = slot; renderSlots(); };
    bookingSlots.appendChild(btn);
  });
  bookingSummary.textContent = `${venue.name} // ${venue.price} per session // ${activeSlot} selected`;
}

function openBooking() {
  if (!venue) return;
  renderSlots();
  openModal(bookingModal);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('open');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('open'), 3200);
}

function openModal(modal) {
  modal.classList.add('open');
  const first = modal.querySelector('input, select, button:not(.modal-close)');
  if (first) first.focus();
}

function closeModals() {
  document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
}

document.getElementById('navOwner').addEventListener('click', () => openModal(ownerModal));
document.getElementById('navSignin').addEventListener('click', () => openModal(signinModal));
document.getElementById('closeBooking').addEventListener('click', closeModals);
document.getElementById('closeOwner').addEventListener('click', closeModals);
document.getElementById('closeSignin').addEventListener('click', closeModals);

document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModals(); });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

document.getElementById('bookingForm').addEventListener('submit', e => {
  e.preventDefault();
  closeModals();
  showToast(`RESERVED // ${venue.name} // ${bookingDate.value} // ${activeSlot} // TS-${Date.now().toString().slice(-5)}`);
});
document.getElementById('ownerForm').addEventListener('submit', e => {
  e.preventDefault(); closeModals();
  showToast('OWNER ONBOARDING REQUEST CAPTURED // DEMO');
});
document.getElementById('signinForm').addEventListener('submit', e => {
  e.preventDefault(); closeModals();
  showToast('DRIVER DEMO SESSION OPENED');
});

// Auto-open booking if ?book=true
if (params.get('book') === 'true' && venue) openBooking();
</script>
